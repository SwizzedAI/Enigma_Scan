<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SYNTAX — signal field</title>
<style>
  :root{
    --bone:#e8e4d8; --mint:#7fe6c4; --mint-dim:#3f6f60;
    --glass:rgba(18,24,26,0.55); --line:rgba(127,230,196,0.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#000;overflow:hidden;}
  body{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;color:var(--bone);}
  #stage{position:fixed;inset:0;display:block;width:100%;height:100%;}

  #bar{
    position:fixed;left:14px;bottom:14px;z-index:10;
    display:flex;flex-wrap:wrap;align-items:center;gap:8px;
    padding:9px 11px;border-radius:12px;
    background:var(--glass);border:1px solid var(--line);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    max-width:calc(100vw - 28px);
    font-size:12px;letter-spacing:.03em;
  }
  .btn{
    appearance:none;cursor:pointer;
    background:rgba(127,230,196,0.06);color:var(--bone);
    border:1px solid var(--line);border-radius:9px;
    padding:8px 12px;font:inherit;letter-spacing:.05em;
    transition:background .15s ease,border-color .15s ease;
    white-space:nowrap;
  }
  .btn:hover{background:rgba(127,230,196,0.12);border-color:rgba(127,230,196,0.35);}
  .btn:active{background:rgba(127,230,196,0.18);}
  .btn.on{color:var(--mint);border-color:rgba(127,230,196,0.45);}
  #track{opacity:.6;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sep{width:1px;height:20px;background:var(--line);}
  label.slab{display:flex;align-items:center;gap:6px;opacity:.75;}
  input[type=range]{width:88px;accent-color:var(--mint);}
  #sig{
    position:fixed;top:14px;right:16px;z-index:10;
    font-size:22px;color:rgba(127,230,196,0.5);user-select:none;pointer-events:none;
    text-shadow:0 0 14px rgba(127,230,196,0.25);
  }
  #hint{
    position:fixed;top:14px;left:16px;z-index:10;
    font-size:11px;letter-spacing:.16em;color:rgba(232,228,216,0.35);
    user-select:none;pointer-events:none;
  }
  input[type=file]{position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;}
  #msg{background:rgba(127,230,196,0.06);border:1px solid var(--line);border-radius:9px;
       color:var(--bone);font:inherit;padding:8px 10px;width:190px;letter-spacing:.03em;}
  #msg::placeholder{color:rgba(232,228,216,0.35);}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="hint">SYNTAX · SIGNAL FIELD</div>
<div id="sig">谜</div>

<div id="bar">
  <button class="btn" id="load">▸ Load track</button>
  <button class="btn" id="play" disabled style="opacity:.4">Play</button>
  <span id="track">no track</span>
  <span class="sep"></span>
  <button class="btn on" id="pal">SIGNAL</button>
  <button class="btn" id="dep">DEPESCHE</button>
  <input type="text" id="msg" placeholder="message…" value="谜 SIGNAL ACQUIRED — SYNTAX DECODED — ENIGMA — " style="display:none">
  <label class="slab">gain <input type="range" id="gain" min="0.4" max="3" step="0.05" value="1.35"></label>
  <input type="file" id="file" accept="audio/*,.mp3,.m4a,.aac,.wav,.flac,.ogg,.oga">
</div>

<script>
(() => {
  "use strict";
  const cv = document.getElementById('stage');
  const ctx = cv.getContext('2d', { alpha:false });

  // ---- palettes ---------------------------------------------------------
  const PAL = {
    SIGNAL: { base:[196,38,132], lit:[95,205,255], core:[120,200,255],
              boA:[224,60,150],  boB:[95,205,255] },
    ENIGMA: { base:[70,116,102], lit:[126,230,196], core:[200,214,200],
              boA:[126,230,196], boB:[120,150,140] }
  };
  let palName = 'SIGNAL';
  let P = PAL[palName];
  // beat + depesche state
  let bassAvg=0, beat=0, beatCool=0;
  let depesche=false, decodeHead=0, scroll=0, readRow=22;

  // ---- glyphs -----------------------------------------------------------
  const GLYPHS = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz0123456789{}[]()<>/\\=+*#$@&%谜".split("");
  const rnd = () => GLYPHS[(Math.random()*GLYPHS.length)|0];

  // ---- world / grid -----------------------------------------------------
  const COLS = 58, ROWS = 56;
  const XMIN = -1.05, XMAX = 2.55;
  const ZNEAR = 1.2, ZFAR = 26, CAMH = 1.2;
  let cells = [];        // {x, z, ch, u}
  let zByRow = [];
  function buildGrid(){
    cells = []; zByRow = [];
    for(let j=0;j<ROWS;j++){
      const z = ZNEAR * Math.pow(ZFAR/ZNEAR, j/(ROWS-1));
      zByRow.push(z);
      for(let i=0;i<COLS;i++){
        const x = XMIN + (XMAX-XMIN)*(i/(COLS-1));
        const u = i/(COLS-1);
        cells.push({ x, z, u, ch: rnd() });
      }
    }
  }
  buildGrid();

  // ---- bokeh (depth of field orbs) -------------------------------------
  let bokeh = [];
  function buildBokeh(){
    bokeh = [];
    for(let k=0;k<46;k++){
      bokeh.push({
        x: XMIN - 0.3 + Math.random()*(XMAX-XMIN+0.6),
        z: 0.6 + Math.random()*29,
        c: Math.random(),
        drift: (Math.random()-0.5)*0.04,
        u: Math.random()
      });
    }
  }
  buildBokeh();

  // ---- projection & view params ----------------------------------------
  let W=0,H=0,focal=0,vpX=0,vpY=0,dpr=1;
  function resize(){
    dpr = Math.min(window.devicePixelRatio||1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = Math.round(W*dpr); cv.height = Math.round(H*dpr);
    cv.style.width = W+"px"; cv.style.height = H+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
    focal = 0.74*H;
    vpX = 0.30*W;
    vpY = 0.30*H;
    makeGlow();
    computeReadRow();
  }
  window.addEventListener('resize', resize, {passive:true});
  window.addEventListener('orientationchange', ()=>setTimeout(resize,120), {passive:true});

  // ---- glow sprite ------------------------------------------------------
  let glow;
  function makeGlow(){
    glow = document.createElement('canvas');
    glow.width = glow.height = 64;
    const g = glow.getContext('2d');
    const rad = g.createRadialGradient(32,32,0,32,32,32);
    const [r,gc,b] = P.lit;
    rad.addColorStop(0, `rgba(${r},${gc},${b},0.9)`);
    rad.addColorStop(0.4, `rgba(${r},${gc},${b},0.28)`);
    rad.addColorStop(1, `rgba(${r},${gc},${b},0)`);
    g.fillStyle = rad; g.fillRect(0,0,64,64);
  }

  // ---- audio ------------------------------------------------------------
  let actx=null, analyser=null, freq=null, audioEl=null, srcNode=null;
  let audioReady=false, playing=false, level=0, USABLE=0;
  function ensureAudio(){
    if(actx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    actx = new AC();
    audioEl = new Audio();
    audioEl.crossOrigin = "anonymous";
    audioEl.loop = true;
    srcNode = actx.createMediaElementSource(audioEl);
    analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.72;
    freq = new Uint8Array(analyser.frequencyBinCount);
    USABLE = Math.floor(analyser.frequencyBinCount*0.78); // trim dead top bins
    srcNode.connect(analyser);
    analyser.connect(actx.destination);
    audioEl.addEventListener('play',  ()=>{ playing=true;  setPlayBtn(); });
    audioEl.addEventListener('pause', ()=>{ playing=false; setPlayBtn(); });
    audioEl.addEventListener('ended', ()=>{ playing=false; setPlayBtn(); });
    audioEl.addEventListener('error', ()=> setStatus('cannot decode this file', true));
    audioEl.addEventListener('canplay', ()=> setStatus('ready — tap Play'));
  }

  // ---- UI ---------------------------------------------------------------
  const fileInput = document.getElementById('file');
  const playBtn   = document.getElementById('play');
  const loadBtn   = document.getElementById('load');
  const palBtn    = document.getElementById('pal');
  const gainSl    = document.getElementById('gain');
  const trackEl   = document.getElementById('track');
  let gain = parseFloat(gainSl.value);

  function setPlayBtn(){
    playBtn.textContent = playing ? "Pause" : "Play";
    playBtn.classList.toggle('on', playing);
  }

  loadBtn.addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    ensureAudio();
    try{
      const url = URL.createObjectURL(f);
      audioEl.src = url; audioEl.load();
    }catch(err){ setStatus('load failed', true); return; }
    trackEl.style.color=''; trackEl.textContent = f.name; trackEl.style.opacity = .85;
    playBtn.disabled = false; playBtn.style.opacity = 1;
    fileInput.value = '';   // lets you re-pick the same file
  });
  playBtn.addEventListener('click', ()=>{
    if(!audioEl) return;
    if(actx && actx.state === 'suspended') actx.resume();   // no await — keep the gesture
    if(audioEl.paused){
      const p = audioEl.play();
      if(p && p.catch) p.catch(()=> setStatus('tap Play again', true));
    } else audioEl.pause();
  });
  palBtn.addEventListener('click', ()=>{
    palName = palName === 'SIGNAL' ? 'ENIGMA' : 'SIGNAL';
    P = PAL[palName];
    palBtn.textContent = palName;
    makeGlow();
  });
  gainSl.addEventListener('input', ()=> gain = parseFloat(gainSl.value));

  const depBtn = document.getElementById('dep');
  const msgInput = document.getElementById('msg');
  depBtn.addEventListener('click', ()=>{
    depesche = !depesche;
    depBtn.classList.toggle('on', depesche);
    msgInput.style.display = depesche ? 'block' : 'none';
  });
  function msgChars(){
    let s = (msgInput.value || " ").toUpperCase();
    if(!s.endsWith(" ")) s += "   ";
    return s;
  }
  function setStatus(t, err){
    trackEl.textContent = t;
    trackEl.style.opacity = .85;
    trackEl.style.color = err ? '#ffb4b4' : '';
  }
  function computeReadRow(){
    let best = Math.floor(ROWS*0.4), bestd = 1e9;
    for(let j=0;j<ROWS;j++){
      const px = Math.min(focal/zByRow[j]*0.05, 78);
      const d = Math.abs(px-24);
      if(d < bestd){ bestd = d; best = j; }
    }
    readRow = best;
  }

  // drag & drop (desktop convenience)
  window.addEventListener('dragover', e=>e.preventDefault());
  window.addEventListener('drop', e=>{
    e.preventDefault();
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if(!f || !f.type.startsWith('audio')) return;
    ensureAudio();
    audioEl.src = URL.createObjectURL(f); audioEl.load();
    trackEl.textContent = f.name; trackEl.style.opacity=.85;
    playBtn.disabled=false; playBtn.style.opacity=1;
  });

  // ---- helpers ----------------------------------------------------------
  const clamp=(v,a,b)=>v<a?a:v>b?b:v;
  function smooth(a,b,x){ x=clamp((x-a)/(b-a),0,1); return x*x*(3-2*x); }

  // ---- render -----------------------------------------------------------
  let sweep=0, last=performance.now();
  function frame(now){
    const dt = Math.min((now-last)/1000, 0.05); last=now;

    // audio read + beat detection
    let audioActive=false;
    if(playing && analyser){
      analyser.getByteFrequencyData(freq);
      let s=0; for(let k=0;k<USABLE;k++) s+=freq[k];
      level = (s/USABLE)/255;
      audioActive = level > 0.001;
      let bs=0; const nb=Math.min(10,USABLE);
      for(let k=1;k<=nb;k++) bs+=freq[k];
      bs=(bs/nb)/255;
      bassAvg = bassAvg*0.92 + bs*0.08;
      beatCool -= dt;
      if(bs > bassAvg*1.3 && bs > 0.28 && beatCool <= 0){ beat=1; beatCool=0.14; }
    } else { level *= 0.94; }
    beat = Math.max(0, beat - dt*3.2);

    // sweep motion (idle heartbeat; stays as faint ambient during audio)
    sweep += dt*0.28; if(sweep>1.35) sweep-=1.7;
    const sweepStrength = audioActive ? 0.22 : 0.95;

    scroll += dt*2.2;                       // decode ticker scroll
    decodeHead += dt*(0.5 + beat*1.6);      // scanner head, jumps on beats
    if(decodeHead > 1.25) decodeHead -= 1.4;

    // occasional scramble of a few cells (decode feel)
    for(let n=0;n<26;n++){ cells[(Math.random()*cells.length)|0].ch = rnd(); }

    render(sweepStrength, audioActive);
    requestAnimationFrame(frame);
  }

  function render(sweepStrength, audioActive){
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,W,H);

    const msg  = depesche ? msgChars() : null;
    const mlen = msg ? msg.length : 0;
    const sOff = Math.floor(scroll);

    // horizon core glow
    ctx.globalCompositeOperation = 'lighter';
    const cg = ctx.createRadialGradient(vpX,vpY,0, vpX,vpY, 0.34*H);
    const [cr,cgc,cb]=P.core;
    cg.addColorStop(0, `rgba(${cr},${cgc},${cb},${0.16+level*0.22+beat*0.18})`);
    cg.addColorStop(1, `rgba(${cr},${cgc},${cb},0)`);
    ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);

    // bokeh (back)
    drawBokeh(false);

    // glyph field, far -> near
    ctx.globalCompositeOperation = 'source-over';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const [br,bg,bb]=P.base, [lr,lg,lb]=P.lit;

    for(let j=0;j<ROWS;j++){
      const z = zByRow[j];
      const inv = focal/z;
      const px = clamp(inv*0.05, 3, 78);
      const t  = (z-ZNEAR)/(ZFAR-ZNEAR);
      let depthA = Math.pow(1-t, 0.85);
      depthA *= smooth(0.0,0.16,t);          // fade the very-near for DoF
      if(depthA < 0.02) continue;
      ctx.font = px+"px ui-monospace, Menlo, monospace";
      const baseY = vpY + CAMH*inv;

      const isReadRow = (msg && j === readRow);
      for(let i=0;i<COLS;i++){
        const c = cells[j*COLS+i];
        const sx = vpX + c.x*inv;
        if(sx < -40 || sx > W+40) continue;

        // readout row spells the decoded message
        let ch = c.ch;
        if(isReadRow) ch = msg[((i+sOff)%mlen + mlen) % mlen];

        // illumination
        let audLit=0;
        if(audioActive){
          const bin = (c.u*(USABLE-1))|0;
          audLit = Math.pow(freq[bin]/255, 1.5)*gain;
        }
        const d = c.u - sweep;
        const swLit = Math.exp(-(d*d)/0.018)*sweepStrength;
        let extra = 0;
        if(isReadRow){
          const dh = c.u - decodeHead;
          extra = Math.exp(-(dh*dh)/0.006)*0.95;   // scanner flash sweeping the message
        }
        const lit = clamp(Math.max(audLit, swLit, extra), 0, 1);

        const sy = baseY - lit*px*0.9;
        if(sy < -20 || sy > H+20) continue;

        // colour: readout decodes toward bone/core, field lights toward accent
        const tgt = isReadRow ? P.core : P.lit;
        const m = Math.pow(lit,0.8);
        const r=(br+(tgt[0]-br)*m)|0, g=(bg+(tgt[1]-bg)*m)|0, b=(bb+(tgt[2]-bb)*m)|0;
        let a = clamp(depthA*(0.34+0.85*lit), 0, 1);
        if(isReadRow) a = Math.max(a, depthA*0.72);   // keep the message legible
        ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
        ctx.fillText(ch, sx, sy);

        // glow for strongly lit glyphs
        if(lit > 0.5 && glow){
          const gs = px*(2.2+lit*2.0);
          ctx.globalCompositeOperation='lighter';
          ctx.globalAlpha = (lit-0.5)*0.9;
          ctx.drawImage(glow, sx-gs/2, sy-gs/2, gs, gs);
          ctx.globalAlpha = 1;
          ctx.globalCompositeOperation='source-over';
        }
      }
    }

    // readout scan bar
    if(depesche){
      const invr = focal/zByRow[readRow], yr = vpY + CAMH*invr;
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = `rgba(${P.core[0]},${P.core[1]},${P.core[2]},0.05)`;
      ctx.fillRect(0, yr-1, W, 2);
      ctx.globalCompositeOperation='source-over';
    }

    // bokeh (front, big + faint)
    drawBokeh(true);

    // vignette
    ctx.globalCompositeOperation='source-over';
    const vg = ctx.createRadialGradient(W*0.45,H*0.5,H*0.2, W*0.45,H*0.5,H*0.85);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(0,0,0,0.72)');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }

  function drawBokeh(front){
    ctx.globalCompositeOperation='lighter';
    for(const bk of bokeh){
      const isFront = bk.z < ZNEAR;
      if(front !== isFront) continue;
      bk.x += bk.drift*0.016;
      if(bk.x>XMAX+0.4) bk.x=XMIN-0.4;
      if(bk.x<XMIN-0.4) bk.x=XMAX+0.4;
      const inv=focal/bk.z;
      const sx=vpX+bk.x*inv;
      const sy=vpY+CAMH*inv;
      if(sx<-200||sx>W+200||sy<-200||sy>H+200) continue;
      const rad = clamp(inv*(isFront?0.10:0.045), 6, 220) * (1 + beat*0.28);
      const col = bk.c<0.5 ? P.boA : P.boB;
      let a = (isFront?0.05:0.10) + level*0.06 + beat*0.09;
      a *= (bk.c<0.5?1:0.85);
      const gr = ctx.createRadialGradient(sx,sy,0, sx,sy,rad);
      gr.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${a})`);
      gr.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.fillStyle=gr;
      ctx.beginPath(); ctx.arc(sx,sy,rad,0,6.2832); ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
